<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toko Emas ANTAM Official | Jual Beli Emas Batangan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;scroll-behavior:smooth;}
body{background:#0f0f0f;color:#fff}

/* NAVBAR */
nav{
background:#000;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
}

nav h2{color:#d4af37}

.cart-icon{
position:relative;
font-size:22px;
}

#cartCount{
position:absolute;
top:-8px;
right:-10px;
background:red;
border-radius:50%;
padding:2px 7px;
font-size:12px;
}

/* HERO */
.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1610375461246-83df859d849d');
background-size:cover;
}

/* LOGO */
.logo img{
width:200px;
border-radius:50%;
box-shadow:0 0 60px gold, 0 0 100px orange;
animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 30px gold; }
  to { box-shadow: 0 0 80px orange; }
}

.hero h1{color:#d4af37;font-size:40px}
.hero p{margin-top:10px;opacity:.9}

/* BUTTON */
.btn{
background:#25D366;
padding:13px 22px;
border-radius:8px;
color:white;
text-decoration:none;
display:inline-block;
margin-top:15px;
cursor:pointer;
border:none;
}

/* SECTION */
.section{
max-width:1100px;
margin:auto;
padding:70px 20px;
}

.section h2{
text-align:center;
color:#d4af37;
margin-bottom:30px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
padding:25px;
border-radius:12px;
}

select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:none;
}

/* TESTIMONI */
.testimoni-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.testi-card{
background:#1a1a1a;
padding:20px;
border-radius:12px;
}

.testi-name{color:#d4af37;font-weight:600}
.stars{color:gold;margin:8px 0}

/* MAP */
iframe{
width:100%;
height:320px;
border:0;
border-radius:10px;
margin-top:20px;
}

/* FLOAT WA */
.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
}

footer{
background:#000;
text-align:center;
padding:25px;
color:#aaa;
}

button{
padding:5px 10px;
margin:3px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<h2>ANTAM GOLD</h2>
<div class="cart-icon">🛒 <span id="cartCount">0</span></div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="logo">
<img src="file_00000000db94720b99717bea4b80b9d9.png">
</div>

<h1>Toko Emas ANTAM Official</h1>
<p>Order Mudah • Aman • Terpercaya</p>
<a class="btn" href="https://wa.me/6283172766800">Chat WhatsApp</a>

</section>

<!-- ORDER -->
<section class="section">
<h2>Order Emas ANTAM</h2>

<div class="grid">

<div class="card">
<h3>Pilih Gramasi</h3>

<select id="gram">
<option value="785000">0.5 Gram - Rp785.000</option>
<option value="1460000">1 Gram - Rp1.460.000</option>
<option value="7050000">5 Gram - Rp7.050.000</option>
<option value="14000000">10 Gram - Rp14.000.000</option>
</select>

<button class="btn" onclick="tambahCart()">Tambah Keranjang</button>
</div>

<div class="card">
<h3>🛒 Keranjang</h3>
<div id="cartItems"></div>
<hr>
<h3>Total: <span id="totalHarga">Rp0</span></h3>
<button class="btn" onclick="checkoutWA()">Checkout WhatsApp</button>
</div>

</div>
</section>

<footer>© 2026 Toko Emas ANTAM Official</footer>

<a class="wa" href="https://wa.me/6283172766800">WA</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function rupiah(a){return "Rp"+a.toLocaleString("id-ID");}

function updateCart(){
let total=0,jumlah=0;
let c=document.getElementById("cartItems");
c.innerHTML="";
cart.forEach((item,i)=>{
total+=item.harga*item.qty;
jumlah+=item.qty;
c.innerHTML+=`<div>${item.nama} x${item.qty}</div>`;
});
document.getElementById("totalHarga").innerText=rupiah(total);
document.getElementById("cartCount").innerText=jumlah;
localStorage.setItem("cart",JSON.stringify(cart));
}

function tambahCart(){
let s=document.getElementById("gram");
let nama=s.options[s.selectedIndex].text;
let harga=parseInt(s.value);
let item=cart.find(p=>p.nama===nama);
if(item){item.qty++;}else{cart.push({nama,harga,qty:1});}
updateCart();
}

function checkoutWA(){
let pesan="Halo Admin,%0ASaya ingin order:%0A";
cart.forEach((item,i)=>{
pesan+=`${i+1}. ${item.nama} x${item.qty}%0A`;
});
window.open("https://wa.me/6283172766800?text="+pesan);
}

updateCart();
</script>

</body>
</html>
