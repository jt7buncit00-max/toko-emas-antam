<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toko Emas ANTAM Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0b0b0b;color:#fff}

nav{
background:#000;
padding:15px 25px;
display:flex;
justify-content:space-between;
}

nav h2{color:#d4af37}

#cartCount{
background:red;
border-radius:50%;
padding:2px 7px;
font-size:12px;
}

/* TEXT BERJALAN */
.running-container{
width:100%;
overflow:hidden;
background:#d4af37;
color:#000;
padding:8px 0;
position:relative;
cursor:pointer;
animation:bgAnim 6s infinite alternate;
}

.running-text{
white-space:nowrap;
position:absolute;
font-weight:bold;
animation:jalan 12s linear infinite;
}

@keyframes jalan{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

@keyframes bgAnim{
0%{background:#d4af37}
50%{background:#ffd700}
100%{background:#c9a227}
}

/* HERO */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.95)),
url('https://images.unsplash.com/photo-1610375461246-83df859d849d');
background-size:cover;
}

.logo img{
width:180px;
border-radius:50%;
box-shadow:0 0 60px gold;
}

.hero h1{color:#d4af37}

/* BUTTON */
.btn{
background:#25D366;
padding:12px 25px;
border-radius:10px;
color:#fff;
text-decoration:none;
display:inline-block;
margin-top:15px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 15px #25D366;
}

.btn:active{
transform:scale(0.95);
}

/* SECTION */
.section{padding:60px 20px;max-width:1100px;margin:auto}
.section h2{text-align:center;color:#d4af37;margin-bottom:25px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* CARD ANIMASI */
.card{
background:#141414;
padding:20px;
border-radius:15px;
transition:0.4s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 10px 30px rgba(212,175,55,0.6);
}
